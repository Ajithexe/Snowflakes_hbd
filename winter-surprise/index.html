<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Winter Surprise ❄️ | Birthday Surprise</title>
  <meta name="description" content="A beautifully crafted winter surprise, birthday letter, and constellation wishing system featuring glowing snow, aurora lights, and gentle music.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@100;200;300;400&display=swap');

    :root {
      --ice: #a8d8f0;
      --ice-bright: #d4eeff;
      --silver: #c8d8e8;
      --lavender: #b8a8e0;
      --navy: #020614;
      --navy-deep: #010309;
      --frost: rgba(180, 220, 255, 0.08);
      --glow: rgba(168, 216, 240, 0.4);
      --purp-glow: rgba(184, 168, 224, 0.35);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--navy-deep);
      font-family: 'Outfit', sans-serif;
      cursor: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* CUSTOM CURSOR SYSTEM */
    #cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--ice-bright);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px 4px rgba(168, 216, 240, 0.7);
      transition: transform 0.2s ease;
    }
    #cursor-trail {
      position: fixed;
      width: 28px; height: 28px;
      border: 1px solid rgba(168, 216, 240, 0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
    }
    #cursor.hovered {
      width: 4px; height: 4px;
      background: var(--lavender);
      box-shadow: 0 0 16px 8px rgba(184, 168, 224, 0.85);
    }
    #cursor-trail.hovered {
      width: 48px; height: 48px;
      border: 1px dashed rgba(184, 168, 224, 0.7);
      animation: rotateDashed 8s linear infinite;
    }
    @keyframes rotateDashed {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    #wishTooltip {
      position: fixed;
      background: rgba(8, 16, 36, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(168, 216, 240, 0.3);
      border-radius: 6px;
      padding: 0.5rem 0.9rem;
      color: var(--ice-bright);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      pointer-events: none;
      z-index: 10000;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: pre-wrap;
      max-width: 260px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.4), 0 0 12px rgba(168, 216, 240, 0.2);
    }

    /* BACKGROUND CANVASES */
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    #canvas-bg { z-index: 0; }
    #canvas-aurora { z-index: 1; opacity: 0; transition: opacity 4s ease; }
    #canvas-snow { z-index: 2; }
    #canvas-particles { z-index: 3; }
    #canvas-mouse { z-index: 4; }

    /* FLOATING AUDIO CONTROLLER */
    .audio-control {
      position: fixed;
      top: 2rem; right: 2rem;
      z-index: 100;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      width: 46px; height: 46px;
      padding: 11px;
      background: rgba(10, 22, 48, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(168, 216, 240, 0.2);
      border-radius: 50%;
      cursor: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      justify-content: center;
      opacity: 0;
      visibility: hidden;
    }
    .audio-control.visible {
      opacity: 1;
      visibility: visible;
    }
    .audio-control:hover {
      border-color: rgba(168, 216, 240, 0.6);
      box-shadow: 0 0 20px rgba(168, 216, 240, 0.25), inset 0 0 10px rgba(168, 216, 240, 0.1);
      transform: scale(1.08);
    }
    .visualizer-bar {
      width: 3px;
      height: 100%;
      background: var(--ice);
      transform-origin: bottom;
      transform: scaleY(0.2);
      transition: transform 0.15s ease;
      border-radius: 1px;
    }
    /* Fallback CSS animation if Web Audio API visualizer is CORS-blocked */
    .audio-control.playing.fallback .visualizer-bar {
      animation: bounceBar 1s ease-in-out infinite alternate;
      animation-delay: calc(var(--i) * 0.15s);
    }
    @keyframes bounceBar {
      0% { transform: scaleY(0.15); }
      100% { transform: scaleY(1); }
    }

    /* SCREENS CONTAINER */
    main {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
    }

    /* SCREEN 1: Welcome */
    #screen-opening {
      z-index: 10;
    }
    .opening-text {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      color: var(--ice-bright);
      letter-spacing: 0.25em;
      text-align: center;
      text-shadow: 0 0 35px rgba(168, 216, 240, 0.8), 0 0 70px rgba(168, 216, 240, 0.35);
      opacity: 0;
      transform: translateY(25px);
      animation: fadeUp 2s 1s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
    }
    .opening-sub {
      font-family: 'Outfit', sans-serif;
      font-weight: 200;
      font-size: clamp(0.7rem, 1.8vw, 0.9rem);
      color: var(--silver);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      margin-top: 1.4rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 2s 1.8s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
    }
    .open-btn {
      margin-top: 4rem;
      padding: 1.2rem 3.5rem;
      background: rgba(10, 22, 48, 0.25);
      border: 1px solid rgba(168, 216, 240, 0.25);
      color: var(--ice-bright);
      font-family: 'Outfit', sans-serif;
      font-weight: 200;
      font-size: 0.8rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      cursor: none;
      border-radius: 40px;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 2s 2.6s cubic-bezier(0.215, 0.61, 0.355, 1) forwards;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.4s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    .open-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(168, 216, 240, 0.15), transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .open-btn:hover {
      border-color: rgba(168, 216, 240, 0.7);
      box-shadow: 0 0 35px rgba(168, 216, 240, 0.35), inset 0 0 20px rgba(168, 216, 240, 0.05);
      letter-spacing: 0.58em;
      transform: scale(1.03);
    }
    .open-btn:hover::before { opacity: 1; }

    /* SCREEN 2: Letter Card */
    #screen-main {
      z-index: 15;
      padding: 2rem;
      perspective: 1200px;
    }
    .glass-card {
      background: rgba(8, 16, 40, 0.45);
      backdrop-filter: blur(32px) saturate(160%);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      border: 1px solid rgba(168, 216, 240, 0.22);
      border-radius: 8px;
      padding: clamp(2.2rem, 6vw, 4rem) clamp(2rem, 8vw, 5.5rem);
      max-width: 680px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.3),
        0 0 80px rgba(168, 216, 240, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
      transform: translateY(40px) scale(0.94) rotateX(10deg);
      opacity: 0;
      transition: transform 1.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 1.6s ease;
    }
    .screen.active .glass-card {
      transform: translateY(0) scale(1) rotateX(0deg);
      opacity: 1;
    }
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: -150%;
      width: 80%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(168, 216, 240, 0.05), transparent);
      animation: shimmer 7s infinite 3s;
      transform: skewX(-20deg);
    }
    .glass-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 8px;
      background: linear-gradient(135deg,
        rgba(168, 216, 240, 0.25) 0%,
        transparent 35%,
        transparent 65%,
        rgba(184, 168, 224, 0.22) 100%);
      pointer-events: none;
      z-index: -1;
    }

    .card-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: var(--lavender);
      margin-bottom: 2.2rem;
      opacity: 0.85;
      text-shadow: 0 0 10px rgba(184, 168, 224, 0.3);
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5.5vw, 3.2rem);
      color: var(--ice-bright);
      line-height: 1.35;
      text-shadow: 0 0 40px rgba(168, 216, 240, 0.45);
      margin-bottom: 1.8rem;
    }
    .card-title span {
      font-style: italic;
      color: var(--lavender);
      font-weight: 300;
      text-shadow: 0 0 30px rgba(184, 168, 224, 0.4);
    }
    .typewriter-wrap {
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .typewriter {
      font-weight: 200;
      font-size: clamp(0.85rem, 2.2vw, 1.05rem);
      color: var(--silver);
      letter-spacing: 0.08em;
      line-height: 2.0;
      text-align: center;
      position: relative;
    }
    .typewriter::after {
      content: '|';
      color: var(--ice);
      animation: cursorBlink 1s infinite;
      margin-left: 3px;
    }
    .card-divider {
      width: 70px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--ice), transparent);
      margin: 2.2rem auto;
      opacity: 0.5;
    }
    .card-footer {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.9rem, 2.2vw, 1.15rem);
      color: rgba(168, 216, 240, 0.7);
      letter-spacing: 0.12em;
    }

    /* SCREEN 3: Final Constellation & Wishing Well */
    #screen-final {
      z-index: 20;
    }
    .final-message {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      color: var(--ice-bright);
      text-align: center;
      letter-spacing: 0.16em;
      line-height: 1.7;
      text-shadow: 0 0 50px rgba(168, 216, 240, 0.8), 0 0 100px rgba(168, 216, 240, 0.35);
      max-width: 750px;
      padding: 2rem;
      opacity: 0;
      transform: translateY(30px);
      transition: all 2s 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      z-index: 5;
    }
    #screen-final.active .final-message {
      opacity: 1;
      transform: translateY(0);
    }
    .final-snowflake {
      font-size: 2.2rem;
      display: block;
      margin-bottom: 1.8rem;
      animation: spin3d 10s linear infinite;
      filter: drop-shadow(0 0 15px rgba(168, 216, 240, 0.8));
    }

    /* WISHING WELL INPUT SYSTEM */
    .wish-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      margin-top: 2.5rem;
      width: 100%;
      max-width: 420px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 2s 1.6s cubic-bezier(0.23, 1, 0.32, 1);
      z-index: 10;
    }
    #screen-final.active .wish-container {
      opacity: 1;
      transform: translateY(0);
    }
    .wish-input-wrap {
      position: relative;
      width: 100%;
    }
    .wish-container input {
      width: 100%;
      padding: 0.9rem 1.4rem;
      background: rgba(10, 22, 48, 0.4);
      border: 1px solid rgba(168, 216, 240, 0.25);
      border-radius: 30px;
      color: var(--ice-bright);
      font-family: 'Outfit', sans-serif;
      font-weight: 200;
      font-size: 0.85rem;
      text-align: center;
      outline: none;
      cursor: none;
      transition: all 0.4s ease;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .wish-container input::placeholder {
      color: rgba(168, 216, 240, 0.35);
      font-weight: 200;
    }
    .wish-container input:focus {
      border-color: rgba(168, 216, 240, 0.6);
      box-shadow: 0 0 20px rgba(168, 216, 240, 0.22);
      background: rgba(10, 22, 48, 0.6);
    }
    .wish-container button {
      padding: 0.75rem 2.2rem;
      background: rgba(10, 22, 48, 0.3);
      border: 1px solid rgba(168, 216, 240, 0.3);
      color: var(--ice-bright);
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 30px;
      cursor: none;
      transition: all 0.4s ease;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .wish-container button:hover {
      border-color: rgba(168, 216, 240, 0.7);
      box-shadow: 0 0 25px rgba(168, 216, 240, 0.3);
      letter-spacing: 0.26em;
      background: rgba(168, 216, 240, 0.08);
      transform: scale(1.02);
    }

    /* FLOAT AND BURST EFFECTS */
    .hidden-msg {
      position: fixed;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      color: var(--ice-bright);
      letter-spacing: 0.1em;
      pointer-events: none;
      z-index: 100;
      text-shadow: 0 0 15px rgba(168, 216, 240, 0.75);
      white-space: nowrap;
      opacity: 0;
      animation: msgFloat 3.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    /* EDGE FROST OVERLAYS */
    .frost-edge {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .frost-edge.top {
      top: 0; left: 0; right: 0; height: 140px;
      background: linear-gradient(180deg, rgba(140, 200, 255, 0.12) 0%, transparent 100%);
    }
    .frost-edge.bottom {
      bottom: 0; left: 0; right: 0; height: 140px;
      background: linear-gradient(0deg, rgba(140, 200, 255, 0.12) 0%, transparent 100%);
    }
    .frost-edge.left {
      top: 0; left: 0; bottom: 0; width: 100px;
      background: linear-gradient(90deg, rgba(140, 200, 255, 0.08) 0%, transparent 100%);
    }
    .frost-edge.right {
      top: 0; right: 0; bottom: 0; width: 100px;
      background: linear-gradient(-90deg, rgba(140, 200, 255, 0.08) 0%, transparent 100%);
    }

    /* NAVIGATION ELEMENTS */
    .next-btn {
      position: fixed;
      bottom: 2.5rem; right: 2.5rem;
      background: rgba(10, 22, 48, 0.35);
      border: 1px solid rgba(168, 216, 240, 0.2);
      color: var(--ice);
      font-family: 'Outfit', sans-serif;
      font-weight: 200;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      padding: 0.8rem 2rem;
      cursor: none;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      border-radius: 20px;
    }
    .next-btn.visible {
      opacity: 1;
      pointer-events: all;
    }
    .next-btn:hover {
      border-color: rgba(168, 216, 240, 0.65);
      box-shadow: 0 0 25px rgba(168, 216, 240, 0.25);
      letter-spacing: 0.48em;
      transform: scale(1.03);
    }

    .progress-dots {
      position: fixed;
      bottom: 3rem; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 0.6rem;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    .progress-dots.visible { opacity: 1; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(168, 216, 240, 0.35);
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: none;
    }
    .dot.active {
      background: var(--ice-bright);
      box-shadow: 0 0 10px rgba(168, 216, 240, 0.75);
      transform: scale(1.3);
    }

    /* CLICK RIPPLE */
    .ripple {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 90;
      border: 1px solid rgba(168, 216, 240, 0.5);
      transform: translate(-50%, -50%) scale(0);
      animation: rippleOut 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    /* ANIMATION KEYFRAMES */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { left: -150%; }
      100% { left: 200%; }
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes spin3d {
      0% { transform: rotateY(0deg) rotateX(15deg); }
      100% { transform: rotateY(360deg) rotateX(15deg); }
    }
    @keyframes msgFloat {
      0% { opacity: 0; transform: translateY(0); }
      15% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-70px); }
    }
    @keyframes rippleOut {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
      100% { transform: translate(-50%, -50%) scale(9); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Audio Element -->
  
    <!-- Explosion Music -->
    <audio id="explosionMusic" src="perfect_ringtone.mp3" preload="auto"></audio>
    <script>
      function playExplosionMusic(){
        const el = document.getElementById('explosionMusic');
        if(!el) return;
        el.currentTime = 0;
        el.play().catch(()=>{});
      }
    </script>


  <!-- Custom Cursor -->
  <div id="cursor"></div>
  <div id="cursor-trail"></div>
  <div id="wishTooltip"></div>

  <!-- Background Canvas Architecture -->
  <canvas id="canvas-bg"></canvas>
  <canvas id="canvas-aurora"></canvas>
  <canvas id="canvas-snow"></canvas>
  <canvas id="canvas-particles"></canvas>
  <canvas id="canvas-mouse"></canvas>

  <!-- Frost Frame accumulators -->
  <div class="frost-edge top" id="frost-top"></div>
  <div class="frost-edge bottom" id="frost-bottom"></div>
  <div class="frost-edge left" id="frost-left"></div>
  <div class="frost-edge right" id="frost-right"></div>

  <!-- Music Controller widget -->
  <div class="audio-control" id="audioControl" onclick="toggleAudio()" aria-label="Mute/Unmute Music">
    <div class="visualizer-bar" style="--i:0"></div>
    <div class="visualizer-bar" style="--i:1"></div>
    <div class="visualizer-bar" style="--i:2"></div>
    <div class="visualizer-bar" style="--i:3"></div>
    <div class="visualizer-bar" style="--i:4"></div>
  </div>

  <main>
    <!-- Screen 1: Welcome -->
    <section class="screen active" id="screen-opening">
      <h1 class="opening-text">A little winter magic for you ❄️</h1>
      <p class="opening-sub">a surprise awaits in the silence</p>
      <button class="open-btn" id="openBtn" onclick="beginJourney()">Open Your Surprise</button>
    </section>

    <!-- Screen 2: Birthday letter -->
    <section class="screen" id="screen-main">
      <article class="glass-card" id="glassCard">
        <div class="card-eyebrow">a winter birthday letter</div>
        <h2 class="card-title">Happy Birthday,<br><span>dear soul ❄️</span></h2>
        <div class="card-divider"></div>
        <div class="typewriter-wrap">
          <p class="typewriter" id="typewriter"></p>
        </div>
        <div class="card-divider"></div>
        <footer class="card-footer">with warmth, from the winter stars</footer>
      </article>
    </section>

    <!-- Screen 3: Constellation Sky -->
    <section class="screen" id="screen-final">
      <div class="final-message">
        <span class="final-snowflake" aria-hidden="true">❄️</span>
        You are my favorite snowfall<br>in this entire universe.
      </div>
      
      <!-- Wishing Well -->
      <div class="wish-container" id="wishContainer">
        <div class="wish-input-wrap">
          <input type="text" id="wishInput" placeholder="Write a wish to the universe..." maxlength="80">
        </div>
        <button id="wishBtn" onclick="submitWish()">Send to the Stars</button>
      </div>
    </section>
  </main>

  <!-- Navigation Layer -->
  <button class="next-btn" id="nextBtn" onclick="nextScreen()">Continue →</button>
  
  <nav class="progress-dots" id="dots" aria-hidden="true">
    <div class="dot active" data-i="0"></div>
    <div class="dot" data-i="1"></div>
    <div class="dot" data-i="2"></div>
  </nav>

  <script>
    // =====================
    // STATE & GLOBAL REFS
    // =====================
    let currentScreen = 0;
    let snowStarted = false;
    let typewriterDone = false;
    let audioCtx = null;
    let bgMusic = null;
    let windNoiseNode = null;
    let windGainNode = null;
    let isChimePlaying = false;

    const hiddenMessages = [
      "May every wish come true ✦",
      "You deserve all the magic ❄️",
      "The stars aligned for you",
      "Happy Birthday, rare soul",
      "The universe celebrates you",
      "Born in winter wonder ✦",
      "You are endlessly loved",
      "This moment is yours ❄️"
    ];

    // =====================
    // CANVAS INITIALIZATION
    // =====================
    const bgCanvas = document.getElementById('canvas-bg');
    const auroraCanvas = document.getElementById('canvas-aurora');
    const snowCanvas = document.getElementById('canvas-snow');
    const partCanvas = document.getElementById('canvas-particles');
    const mouseCanvas = document.getElementById('canvas-mouse');

    const bgCtx = bgCanvas.getContext('2d');
    const auroraCtx = auroraCanvas.getContext('2d');
    const snowCtx = snowCanvas.getContext('2d');
    const partCtx = partCanvas.getContext('2d');
    const mouseCtx = mouseCanvas.getContext('2d');

    function resize() {
      [bgCanvas, auroraCanvas, snowCanvas, partCanvas, mouseCanvas].forEach(c => {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
      });
    }
    resize();
    window.addEventListener('resize', resize);

    // =====================
    // Twinkling Star setup
    // =====================
    const stars = [];
    const numStars = 220;
    for (let i = 0; i < numStars; i++) {
      stars.push({
        x: Math.random(),
        y: Math.random(),
        r: Math.random() * 1.3 + 0.2,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.4 + 0.15
      });
    }

    function drawStars(t) {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      
      // Cosmic radial dark blue depth
      const grad = bgCtx.createRadialGradient(
        bgCanvas.width * 0.5, bgCanvas.height * 0.3, 0,
        bgCanvas.width * 0.5, bgCanvas.height * 0.5, bgCanvas.width * 0.9
      );
      grad.addColorStop(0, '#060b20');
      grad.addColorStop(0.5, '#020511');
      grad.addColorStop(1, '#010207');
      bgCtx.fillStyle = grad;
      bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

      // Subtle breathing cosmic nebulae clouds
      bgCtx.save();
      bgCtx.globalCompositeOperation = 'screen';
      
      const neb1X = bgCanvas.width * (0.5 + Math.sin(t * 0.04) * 0.12);
      const neb1Y = bgCanvas.height * (0.35 + Math.cos(t * 0.06) * 0.08);
      const rad1 = bgCanvas.width * 0.5;
      const neb1 = bgCtx.createRadialGradient(neb1X, neb1Y, 0, neb1X, neb1Y, rad1);
      neb1.addColorStop(0, 'rgba(100, 70, 190, 0.09)');
      neb1.addColorStop(0.5, 'rgba(70, 45, 140, 0.03)');
      neb1.addColorStop(1, 'rgba(0,0,0,0)');
      bgCtx.fillStyle = neb1;
      bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

      const neb2X = bgCanvas.width * (0.35 + Math.cos(t * 0.03) * 0.1);
      const neb2Y = bgCanvas.height * (0.45 + Math.sin(t * 0.05) * 0.1);
      const rad2 = bgCanvas.width * 0.45;
      const neb2 = bgCtx.createRadialGradient(neb2X, neb2Y, 0, neb2X, neb2Y, rad2);
      neb2.addColorStop(0, 'rgba(50, 140, 190, 0.06)');
      neb2.addColorStop(0.5, 'rgba(30, 90, 140, 0.02)');
      neb2.addColorStop(1, 'rgba(0,0,0,0)');
      bgCtx.fillStyle = neb2;
      bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

      bgCtx.restore();

      // twinklers
      stars.forEach(s => {
        const flicker = 0.35 + 0.65 * Math.sin(t * s.speed + s.phase);
        const alpha = 0.2 + flicker * 0.7;
        bgCtx.beginPath();
        bgCtx.arc(s.x * bgCanvas.width, s.y * bgCanvas.height, s.r * (0.8 + flicker * 0.35), 0, Math.PI * 2);
        bgCtx.fillStyle = `rgba(215, 235, 255, ${alpha})`;
        bgCtx.fill();

        // Bright flares
        if (s.r > 1.1 && alpha > 0.78) {
          bgCtx.beginPath();
          bgCtx.strokeStyle = `rgba(215, 235, 255, ${(alpha - 0.78) * 2})`;
          bgCtx.lineWidth = 0.4;
          bgCtx.moveTo(s.x * bgCanvas.width - s.r * 4.5, s.y * bgCanvas.height);
          bgCtx.lineTo(s.x * bgCanvas.width + s.r * 4.5, s.y * bgCanvas.height);
          bgCtx.moveTo(s.x * bgCanvas.width, s.y * bgCanvas.height - s.r * 4.5);
          bgCtx.lineTo(s.x * bgCanvas.width, s.y * bgCanvas.height + s.r * 4.5);
          bgCtx.stroke();
        }
      });
    }

    // =====================
    // CANVAS AURORA RIBBONS
    // =====================
    let auroraVisible = false;
    let auroraOpacity = 0;

    function drawAurora(t) {
      const W = auroraCanvas.width, H = auroraCanvas.height;
      auroraCtx.clearRect(0, 0, W, H);
      if (auroraOpacity <= 0) return;

      const bands = [
        { hue: 175, speed: 0.16, amp: 45, y: H * 0.22, thickness: H * 0.32, phase: 0 },
        { hue: 195, speed: 0.11, amp: 35, y: H * 0.16, thickness: H * 0.26, phase: Math.PI * 0.5 },
        { hue: 270, speed: 0.18, amp: 25, y: H * 0.28, thickness: H * 0.22, phase: Math.PI }
      ];

      auroraCtx.save();
      auroraCtx.globalCompositeOperation = 'lighter';

      bands.forEach(b => {
        const timeSpeed = t * b.speed;
        const grad = auroraCtx.createLinearGradient(0, b.y - b.thickness * 0.25, 0, b.y + b.thickness);
        const colorCycle = (b.hue + Math.sin(t * 0.05) * 22) % 360;

        grad.addColorStop(0, `hsla(${colorCycle}, 80%, 65%, 0)`);
        grad.addColorStop(0.3, `hsla(${colorCycle}, 85%, 60%, ${auroraOpacity * 0.11})`);
        grad.addColorStop(0.7, `hsla(${(colorCycle + 40) % 360}, 80%, 50%, ${auroraOpacity * 0.065})`);
        grad.addColorStop(1, `hsla(${(colorCycle + 80) % 360}, 80%, 45%, 0)`);

        auroraCtx.beginPath();
        auroraCtx.moveTo(0, b.y);
        for (let x = 0; x <= W; x += 15) {
          const ratio = x / W;
          const wave = Math.sin(ratio * Math.PI * 2.5 + timeSpeed + b.phase) * b.amp;
          const subWave = Math.cos(ratio * Math.PI * 5.0 + timeSpeed * 0.8) * (b.amp * 0.35);
          const y = b.y + wave + subWave;
          auroraCtx.lineTo(x, y);
        }
        auroraCtx.lineTo(W, b.y + b.thickness);
        auroraCtx.lineTo(0, b.y + b.thickness);
        auroraCtx.closePath();
        auroraCtx.fillStyle = grad;
        auroraCtx.fill();
      });

      auroraCtx.restore();
    }

    // =====================
    // SNOW SYSTEM
    // =====================
    const flakes = [];
    let snowIntensity = 0; // 0 to 1

    class Snowflake {
      constructor(fromExplosion = false, ex = 0, ey = 0) {
        this.reset(fromExplosion, ex, ey);
      }
      reset(fromExplosion = false, ex = 0, ey = 0) {
        const W = snowCanvas.width, H = snowCanvas.height;
        if (fromExplosion) {
          this.x = ex; this.y = ey;
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 11 + 4;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed - Math.random() * 7;
          this.r = Math.random() * 3 + 1;
          this.gravity = 0.13 + Math.random() * 0.09;
          this.isExplosion = true;
        } else {
          this.x = Math.random() * W * 1.2 - W * 0.1;
          this.y = -15 - Math.random() * 120;
          this.vx = (Math.random() - 0.5) * 0.7;
          this.vy = Math.random() * 1.2 + 0.35;
          this.r = Math.random() * 2.4 + 0.5;
          this.gravity = 0;
          this.isExplosion = false;
        }
        this.alpha = Math.random() * 0.6 + 0.35;
        this.rot = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.04;
        this.layer = Math.random(); 
        this.glow = Math.random() > 0.82;
        this.life = 1;
        this.clickable = !fromExplosion && this.r > 1.4;
        this.id = Math.random();
      }
      update(wind) {
        if (this.isExplosion) {
          this.vx *= 0.965;
          this.vy += this.gravity;
          this.x += this.vx;
          this.y += this.vy;
          this.life -= 0.013;
          if (this.life <= 0) { this.reset(); }
        } else {
          const layerSpeed = 0.45 + this.layer * 1.25;
          this.x += this.vx + wind * layerSpeed;
          this.y += this.vy * layerSpeed * snowIntensity;
          this.rot += this.rotSpeed;
          
          if (this.y > snowCanvas.height + 25 || this.x < -60 || this.x > snowCanvas.width + 60) {
            this.x = Math.random() * snowCanvas.width * 1.2 - snowCanvas.width * 0.1;
            this.y = -15;
            this.vx = (Math.random() - 0.5) * 0.7;
          }
        }
      }
      draw(ctx) {
        if (this.isExplosion && this.life <= 0) return;
        const a = this.isExplosion ? this.life * this.alpha : this.alpha * snowIntensity;
        if (a <= 0) return;

        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);

        if (this.glow && !this.isExplosion) {
          ctx.shadowBlur = 8;
          ctx.shadowColor = 'rgba(168, 216, 240, 0.75)';
        }

        if (this.r > 1.75 && !this.isExplosion) {
          // Exquisite vector snowflake line-drawing
          ctx.strokeStyle = `rgba(205, 235, 255, ${a})`;
          ctx.lineWidth = 0.55;
          for (let i = 0; i < 6; i++) {
            ctx.save();
            ctx.rotate(i * Math.PI / 3);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -this.r * 2.8);
            
            ctx.moveTo(0, -this.r * 0.9);
            ctx.lineTo(this.r * 0.65, -this.r * 1.45);
            ctx.moveTo(0, -this.r * 0.9);
            ctx.lineTo(-this.r * 0.65, -this.r * 1.45);
            
            ctx.stroke();
            ctx.restore();
          }
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, this.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(205, 235, 255, ${a})`;
          ctx.fill();
        }
        ctx.restore();
      }
    }

    // =====================
    // WISH CONSTELLATIONS
    // =====================
    const wishStars = [];

    function drawConstellation(ctx) {
      const settled = wishStars.filter(ws => ws.phase === 'settled');
      ctx.save();
      ctx.strokeStyle = 'rgba(168, 216, 240, 0.085)';
      ctx.lineWidth = 0.55;
      for (let i = 0; i < settled.length; i++) {
        for (let j = i + 1; j < settled.length; j++) {
          const s1 = settled[i];
          const s2 = settled[j];
          const dist = Math.hypot(s1.x - s2.x, s1.y - s2.y);
          if (dist < 180) {
            ctx.beginPath();
            ctx.moveTo(s1.x, s1.y);
            ctx.lineTo(s2.x, s2.y);
            ctx.stroke();
          }
        }
      }
      ctx.restore();
    }

    function updateAndDrawWishes(ctx) {
      wishStars.forEach(ws => {
        if (ws.phase === 'rising') {
          ws.angle += ws.angleSpeed;
          const wave = Math.sin(ws.angle) * 2.2;
          
          ws.y -= 3.8;
          ws.x += (ws.targetX - ws.x) * 0.045 + wave;
          
          if (ws.y <= ws.targetY) {
            ws.y = ws.targetY;
            ws.x = ws.targetX;
            ws.phase = 'settled';
          }

          if (Math.random() > 0.68) {
            mouseParticles.push({
              x: ws.x,
              y: ws.y,
              vx: (Math.random() - 0.5) * 1.1,
              vy: (Math.random() - 0.5) * 1.1 + 0.3,
              r: Math.random() * 1.6 + 0.4,
              life: 1,
              decay: 0.03
            });
          }
        } else {
          ws.angle += 0.01;
          ws.y += Math.sin(ws.angle) * 0.065;
          ws.x += Math.cos(ws.angle) * 0.025;
        }

        // Pulse star drawing
        ws.flickerPhase += ws.flickerSpeed;
        const pulse = 0.4 + 0.6 * Math.sin(ws.flickerPhase);
        const a = 0.55 + pulse * 0.45;
        
        ctx.save();
        ctx.translate(ws.x, ws.y);
        ctx.shadowBlur = 15;
        ctx.shadowColor = 'rgba(168, 216, 240, 0.9)';
        ctx.fillStyle = `rgba(212, 238, 255, ${a})`;
        
        // Render 4-point star vector
        ctx.beginPath();
        for (let i = 0; i < 4; i++) {
          ctx.rotate(Math.PI / 2);
          ctx.lineTo(0, -ws.radius * 2.8 * (0.85 + pulse * 0.15));
          ctx.lineTo(ws.radius * 0.5, 0);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });
    }

    function submitWish() {
      const input = document.getElementById('wishInput');
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      playWishChime();

      // Star floats up into final screen cosmic canvas
      const ws = {
        text: text,
        x: window.innerWidth / 2,
        y: window.innerHeight - 80,
        targetX: Math.random() * (window.innerWidth - 220) + 110,
        targetY: Math.random() * (window.innerHeight * 0.45) + 65,
        phase: 'rising',
        angleSpeed: Math.random() * 0.045 + 0.02,
        angle: 0,
        radius: Math.random() * 1.6 + 1.25,
        flickerSpeed: Math.random() * 0.045 + 0.025,
        flickerPhase: Math.random() * Math.PI
      };
      
      wishStars.push(ws);
    }

    // =====================
    // SINGLE SNOWFLAKE DROP
    // =====================
    let singleFlake = null;
    let dropPhase = 'idle'; 
    let dropT = 0;
    let dropExplosionT = 0;
    let dropCallback = null;
    let shakeAmt = 0;

    function startSingleDrop(callback) {
      dropCallback = callback;
      singleFlake = {
        x: snowCanvas.width / 2,
        y: -30,
        vy: 1.15,
        rot: 0,
        trail: [],
        r: 6.5,
      };
      dropPhase = 'falling';
      dropT = 0;
    }

    function updateSingleDrop() {
      if (dropPhase !== 'falling' || !singleFlake) return;

      singleFlake.vy = Math.min(singleFlake.vy * 1.006, 2.8);
      singleFlake.y += singleFlake.vy;
      singleFlake.rot += 0.016;
      dropT++;

      singleFlake.trail.push({ x: singleFlake.x, y: singleFlake.y, age: 0 });
      if (singleFlake.trail.length > 42) singleFlake.trail.shift();
      singleFlake.trail.forEach(t => t.age++);

      if (singleFlake.y >= snowCanvas.height - 35) {
        dropPhase = 'impact';
        dropExplosionT = 0;
        playIceCrack();
        triggerExplosion(singleFlake.x, singleFlake.y);
        shakeAmt = 14;
        setTimeout(() => {
          dropPhase = 'storm';
          snowIntensity = 0;
          if (dropCallback) dropCallback();
          document.querySelectorAll('.frost-edge').forEach(e => e.style.opacity = '1');
        }, 1250);
      }
    }

    function drawSingleDrop() {
      if (!singleFlake || dropPhase === 'idle' || dropPhase === 'storm') return;

      partCtx.save();
      
      // Beautiful particle tail
      singleFlake.trail.forEach(t => {
        const a = (1 - t.age / 42) * 0.45;
        if (a <= 0) return;
        partCtx.beginPath();
        partCtx.arc(t.x, t.y, 2.2 * (1 - t.age / 42), 0, Math.PI * 2);
        partCtx.fillStyle = `rgba(168, 216, 240, ${a})`;
        partCtx.fill();
      });

      partCtx.shadowBlur = 22;
      partCtx.shadowColor = 'rgba(168, 216, 240, 0.95)';

      // Draw intricate falling flake
      partCtx.save();
      partCtx.translate(singleFlake.x, singleFlake.y);
      partCtx.rotate(singleFlake.rot);
      partCtx.strokeStyle = 'rgba(224, 244, 255, 0.98)';
      partCtx.lineWidth = 1.35;
      
      for (let i = 0; i < 6; i++) {
        partCtx.save();
        partCtx.rotate(i * Math.PI / 3);
        partCtx.beginPath();
        partCtx.moveTo(0, 0);
        partCtx.lineTo(0, -singleFlake.r * 3.3);
        
        partCtx.moveTo(0, -singleFlake.r * 2.1);
        partCtx.lineTo(singleFlake.r * 0.85, -singleFlake.r * 2.75);
        partCtx.moveTo(0, -singleFlake.r * 2.1);
        partCtx.lineTo(-singleFlake.r * 0.85, -singleFlake.r * 2.75);
        
        partCtx.moveTo(0, -singleFlake.r * 1.05);
        partCtx.lineTo(singleFlake.r * 0.65, -singleFlake.r * 1.55);
        partCtx.moveTo(0, -singleFlake.r * 1.05);
        partCtx.lineTo(-singleFlake.r * 0.65, -singleFlake.r * 1.55);
        
        partCtx.stroke();
        partCtx.restore();
      }
      partCtx.restore();
      partCtx.restore();
    }

    // =====================
    // SHOCKWAVE EXPLOSION
    // =====================
    let shockwaves = [];
    let bloomAlpha = 0;
    let bloomX = 0, bloomY = 0;

    function triggerExplosion(ex, ey) {
      for (let i = 0; i < 300; i++) {
        flakes.push(new Snowflake(true, ex, ey));
      }
      shockwaves = [
        { x: ex, y: ey, r: 0, maxR: Math.max(snowCanvas.width, snowCanvas.height) * 0.85, age: 0 },
        { x: ex, y: ey, r: 0, maxR: Math.max(snowCanvas.width, snowCanvas.height) * 0.55, age: 7 },
        { x: ex, y: ey, r: 0, maxR: Math.max(snowCanvas.width, snowCanvas.height) * 0.35, age: 14 }
      ];
      bloomAlpha = 1.0;
      bloomX = ex; bloomY = ey;
    }

    function drawShockwaves(ctx) {
      shockwaves.forEach(sw => {
        if (sw.age > 0) { sw.age--; return; }
        sw.r += (sw.maxR - sw.r) * 0.082;
        const a = Math.max(0, 0.45 * (1 - sw.r / sw.maxR));
        ctx.beginPath();
        ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(168, 216, 240, ${a})`;
        ctx.lineWidth = 2.2;
        ctx.stroke();
      });
      shockwaves = shockwaves.filter(sw => sw.r < sw.maxR);
    }

    function drawBloom(ctx) {
      if (bloomAlpha <= 0) return;
      const maxR = Math.max(snowCanvas.width, snowCanvas.height);
      const grad = ctx.createRadialGradient(bloomX, bloomY, 0, bloomX, bloomY, maxR * 0.65);
      grad.addColorStop(0, `rgba(140, 202, 255, ${bloomAlpha * 0.35})`);
      grad.addColorStop(0.35, `rgba(100, 162, 240, ${bloomAlpha * 0.12})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, snowCanvas.width, snowCanvas.height);
      bloomAlpha = Math.max(0, bloomAlpha - 0.014);
    }

    // =====================
    // CURSOR & STARDUST MOUSE TRAILS
    // =====================
    let mouseParticles = [];
    const stardust = [];
    const maxStardust = 80;
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let lastMouseX = mouseX, lastMouseY = mouseY;
    let hoverActive = false;
    let hoveredWish = null;

    document.addEventListener('mousemove', e => {
      const cursor = document.getElementById('cursor');
      const trail = document.getElementById('cursor-trail');
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      trail.style.left = e.clientX + 'px';
      trail.style.top = e.clientY + 'px';

      mouseX = e.clientX;
      mouseY = e.clientY;

      if (snowStarted) {
        const dx = e.clientX - lastMouseX;
        const dy = e.clientY - lastMouseY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 5) {
          for (let i = 0; i < 2; i++) {
            // Emitting custom star points
            if (stardust.length > maxStardust) stardust.shift();
            stardust.push({
              x: e.clientX + (Math.random()-0.5)*8,
              y: e.clientY + (Math.random()-0.5)*8,
              vx: (Math.random()-0.5)*1.4,
              vy: (Math.random()-0.5)*1.0 - 0.25,
              size: Math.random() * 2.3 + 0.85,
              rot: Math.random() * Math.PI * 2,
              rotSpeed: (Math.random() - 0.5) * 0.1,
              alpha: 1,
              color: Math.random() > 0.55 ? 'hsl(200, 100%, 88%)' : 'hsl(260, 100%, 92%)',
              gravity: 0.015 + Math.random() * 0.02
            });
          }
        }
      }
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;

      // Parallax Snow shifts
      flakes.forEach(f => {
        if (!f.isExplosion) {
          f.vx += (e.movementX * 0.00095) * (0.5 + f.layer);
        }
      });

      // Scan for constellation star hovers
      let found = null;
      const settled = wishStars.filter(ws => ws.phase === 'settled');
      for (const ws of settled) {
        if (Math.hypot(ws.x - e.clientX, ws.y - e.clientY) < 18) {
          found = ws;
          break;
        }
      }
      hoveredWish = found;

      const tooltip = document.getElementById('wishTooltip');
      if (hoveredWish) {
        tooltip.style.opacity = '1';
        tooltip.style.transform = 'scale(1)';
        tooltip.textContent = `✦ "${hoveredWish.text}"`;
        tooltip.style.left = (mouseX + 16) + 'px';
        tooltip.style.top = (mouseY - 14) + 'px';
        trail.classList.add('hovered');
        cursor.classList.add('hovered');
      } else if (!hoverActive) {
        tooltip.style.opacity = '0';
        tooltip.style.transform = 'scale(0.95)';
        trail.classList.remove('hovered');
        cursor.classList.remove('hovered');
      } else {
        tooltip.style.opacity = '0';
        tooltip.style.transform = 'scale(0.95)';
      }
    });

    // Custom hover states for accessibility interactive objects
    document.addEventListener('mouseover', e => {
      const target = e.target;
      if (
        target.tagName === 'BUTTON' || 
        target.closest('.open-btn') || 
        target.closest('.next-btn') || 
        target.closest('.audio-control') ||
        target.closest('#wishInput') ||
        target.closest('#wishBtn') ||
        target.classList.contains('dot')
      ) {
        hoverActive = true;
        document.getElementById('cursor-trail').classList.add('hovered');
        document.getElementById('cursor').classList.add('hovered');
      }
    });

    document.addEventListener('mouseout', e => {
      const target = e.target;
      if (
        target.tagName === 'BUTTON' || 
        target.closest('.open-btn') || 
        target.closest('.next-btn') || 
        target.closest('.audio-control') ||
        target.closest('#wishInput') ||
        target.closest('#wishBtn') ||
        target.classList.contains('dot')
      ) {
        hoverActive = false;
        if (!hoveredWish) {
          document.getElementById('cursor-trail').classList.remove('hovered');
          document.getElementById('cursor').classList.remove('hovered');
        }
      }
    });

    function drawMouseParticles() {
      mouseCtx.clearRect(0, 0, mouseCanvas.width, mouseCanvas.height);
      mouseParticles = mouseParticles.filter(p => p.life > 0);
      mouseParticles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        p.vy -= 0.015;
        p.life -= p.decay;
        const a = p.life;
        mouseCtx.beginPath();
        mouseCtx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
        mouseCtx.fillStyle = `rgba(208, 238, 255, ${a * 0.72})`;
        mouseCtx.shadowBlur = 6;
        mouseCtx.shadowColor = 'rgba(168, 216, 240, 0.65)';
        mouseCtx.fill();
      });
    }

    function drawStardust(ctx) {
      ctx.save();
      for (let i = stardust.length - 1; i >= 0; i--) {
        const p = stardust[i];
        p.vy += p.gravity;
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.rotSpeed;
        p.alpha -= 0.014;

        if (p.alpha <= 0) {
          stardust.splice(i, 1);
          continue;
        }

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        
        // Micro star path drawing
        ctx.beginPath();
        for (let j = 0; j < 4; j++) {
          ctx.rotate(Math.PI / 2);
          ctx.lineTo(0, -p.size * 2.2);
          ctx.lineTo(p.size * 0.45, 0);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    // =====================
    // CLICK TRIGGER ACTIONS
    // =====================
    document.addEventListener('click', e => {
      if (currentScreen === 1) {
        const clicked = flakes.find(f =>
          f.clickable && !f.isExplosion &&
          Math.hypot(f.x - e.clientX, f.y - e.clientY) < f.r * 4.5 + 16
        );
        if (clicked) {
          explodeFlake(clicked, e.clientX, e.clientY);
        }
      }
      
      // Tap Ripple effect
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.left = e.clientX + 'px';
      ripple.style.top = e.clientY + 'px';
      ripple.style.width = '42px'; ripple.style.height = '42px';
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 850);
    });

    function explodeFlake(flake, cx, cy) {
      for (let i = 0; i < 22; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 1.2;
        mouseParticles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: Math.random() * 2 + 0.5,
          life: 1,
          decay: 0.024
        });
      }
      
      const msg = hiddenMessages[Math.floor(Math.random() * hiddenMessages.length)];
      const el = document.createElement('div');
      el.className = 'hidden-msg';
      el.textContent = msg;
      el.style.left = Math.min(Math.max(cx - 120, 10), window.innerWidth - 260) + 'px';
      el.style.top = (cy - 20) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3200);

      playIceCrack();
      playExplosionMusic();
      flake.reset();
    }

    // =====================
    // SOUND & CHIME SYNTHS
    // =====================
    function initAudio() {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        bgMusic = document.getElementById('bgMusic');

        // Route media element through analyzer to sync bar levels
        try {
          const source = audioCtx.createMediaElementSource(bgMusic);
          const analyser = audioCtx.createAnalyser();
          analyser.fftSize = 64;

          const gainNode = audioCtx.createGain();
          gainNode.gain.value = 1.0;

          source.connect(analyser);
          analyser.connect(gainNode);
          gainNode.connect(audioCtx.destination);

          window.audioAnalyser = analyser;
          window.audioDataArray = new Uint8Array(analyser.frequencyBinCount);
        } catch (corsErr) {
          console.warn("Local CORS limits blocked Web Audio media element node link. Falling back to keyframes visualizer.");
          document.getElementById('audioControl').classList.add('fallback');
        }
      } catch (e) {
        console.error("Web Audio API initialization failed:", e);
      }
    }

    function playIceCrack() {
      if (!audioCtx) return;
      try {
        const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.35, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.075));
        }
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.24, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        src.connect(gain);
        gain.connect(audioCtx.destination);
        src.start();
      } catch(e) {}
    }

    function playAmbient() {
      if (!audioCtx) return;
      try {
        // Soft winds synth node
        const bufLen = audioCtx.sampleRate * 4;
        const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) {
          data[i] = (Math.random() * 2 - 1) * 0.024;
        }
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.loop = true;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 350;

        windGainNode = audioCtx.createGain();
        windGainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        // Kept highly atmospheric and quiet to match music
        windGainNode.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 3);

        src.connect(filter);
        filter.connect(windGainNode);
        windGainNode.connect(audioCtx.destination);
        src.start();
        windNoiseNode = src;
      } catch(e) {}
    }

    function playWishChime() {
      if (!audioCtx || isChimePlaying) return;
      isChimePlaying = true;
      try {
        const now = audioCtx.currentTime;
        // Pentatonic C Sweep chime synthesizer
        const chimeFreqs = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98];
        chimeFreqs.forEach((f, idx) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();

          osc.type = 'sine';
          osc.frequency.setValueAtTime(f, now + idx * 0.08);

          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(0.12, now + idx * 0.08 + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + idx * 0.08 + 1.65);

          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now + idx * 0.08);
          osc.stop(now + idx * 0.08 + 2.0);
        });
        setTimeout(() => { isChimePlaying = false; }, chimeFreqs.length * 80 + 1000);
      } catch(e) {
        isChimePlaying = false;
      }
    }

    function fadeInMusic(audioElement, duration = 3500) {
      audioElement.volume = 0;
      audioElement.play().catch(err => {
        console.warn("Autoplay playback prevented:", err);
      });

      const startTime = performance.now();
      function fade() {
        const elapsed = performance.now() - startTime;
        const pct = Math.min(elapsed / duration, 1);
        audioElement.volume = pct * 0.55; 
        if (pct < 1) {
          requestAnimationFrame(fade);
        }
      }
      requestAnimationFrame(fade);
    }

    function toggleAudio() {
      if (!bgMusic) return;
      const ctrl = document.getElementById('audioControl');
      if (bgMusic.paused) {
        bgMusic.play().catch(e => {});
        ctrl.classList.add('playing');
        if (audioCtx && audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      } else {
        bgMusic.pause();
        ctrl.classList.remove('playing');
      }
    }

    // =====================
    // TYPEWRITER LETTER SCROLL
    // =====================
    const typewriterMsg = "On this special day, the universe paused — and every snowflake chose to fall for you. May the warmth of this moment stay long after the last flake settles.";
    let typeIdx = 0;
    let typeInterval = null;

    function startTypewriter() {
      const el = document.getElementById('typewriter');
      el.textContent = '';
      typeIdx = 0;
      
      typeInterval = setInterval(() => {
        el.textContent = typewriterMsg.slice(0, ++typeIdx);
        if (typeIdx >= typewriterMsg.length) {
          clearInterval(typeInterval);
          el.style.animation = 'none';
          typewriterDone = true;
          
          const btn = document.getElementById('nextBtn');
          btn.style.display = 'block';
          btn.style.opacity = '0';
          setTimeout(() => {
            btn.classList.add('visible');
          }, 800);
        }
      }, 45);
    }

    // =====================
    // SCREEN SCENARIOS
    // =====================
    function showScreen(n) {
      document.querySelectorAll('.screen').forEach((s, i) => {
        s.classList.toggle('active', i === n);
      });
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === n);
      });
      currentScreen = n;

      const dots = document.getElementById('dots');
      if (n > 0) dots.classList.add('visible');
    }

    function nextScreen() {
      if (currentScreen === 1) {
        showScreen(2);
        document.getElementById('nextBtn').style.display = 'none';
        
        setTimeout(() => {
          auroraOpacity = 0;
          auroraVisible = true;
          snowIntensity = 0.32; 
          auroraCanvas.style.opacity = '1';
        }, 500);
      }
    }

    function beginJourney() {
      initAudio();
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      playAmbient();

      if (bgMusic) {
        fadeInMusic(bgMusic, 4000);
        const ctrl = document.getElementById('audioControl');
        ctrl.classList.add('visible');
        ctrl.classList.add('playing');
      }

      const opening = document.getElementById('screen-opening');
      opening.style.opacity = '0';
      opening.style.transition = 'opacity 1.5s ease';

      setTimeout(() => {
        opening.classList.remove('active');
        
        startSingleDrop(() => {
          let si = 0;
          const ramp = setInterval(() => {
            si += 0.02;
            snowIntensity = Math.min(si, 1);
            if (si >= 1) {
              clearInterval(ramp);
              snowStarted = true;
              
              setTimeout(() => {
                showScreen(1);
                startTypewriter();
              }, 1200);
            }
          }, 60);
        });

        for (let i = 0; i < 180; i++) {
          const f = new Snowflake();
          f.y = Math.random() * snowCanvas.height;
          flakes.push(f);
        }
      }, 1500);
    }

    // =====================
    // WIND CALCULATOR
    // =====================
    let wind = 0;
    let windTarget = 0;
    let windT = 0;

    function updateWind(t) {
      windT += 0.003;
      windTarget = Math.sin(windT) * 0.32 + Math.sin(windT * 0.4) * 0.22;
      wind += (windTarget - wind) * 0.01;
    }

    function applyShake(ctx) {
      if (shakeAmt <= 0) return;
      const sx = (Math.random() - 0.5) * shakeAmt;
      const sy = (Math.random() - 0.5) * shakeAmt;
      ctx.translate(sx, sy);
      shakeAmt *= 0.88;
    }

    // =====================
    // MAIN LOOP
    // =====================
    let lastT = 0;
    function loop(ts) {
      const t = ts / 1000;
      const dt = t - lastT;
      lastT = t;

      // Twinklers & Nebulae
      drawStars(t);

      // Aurora Renderer
      if (auroraVisible) {
        if (auroraOpacity < 1.0) auroraOpacity = Math.min(1.0, auroraOpacity + 0.0025);
        drawAurora(t);
      }

      // Clear layers
      partCtx.clearRect(0, 0, partCanvas.width, partCanvas.height);
      snowCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);

      snowCtx.save();
      applyShake(snowCtx);

      updateWind(t);
      updateSingleDrop();

      // Shockwaves & explosions
      drawBloom(snowCtx);
      drawShockwaves(snowCtx);

      // Sort and draw snowflakes
      flakes.sort((a, b) => a.layer - b.layer);
      flakes.forEach(f => {
        f.update(wind);
        f.draw(snowCtx);
      });

      // Floating wish stars constellation
      if (currentScreen === 2) {
        drawConstellation(snowCtx);
        updateAndDrawWishes(snowCtx);
      }

      snowCtx.restore();

      // Top layers
      drawSingleDrop();
      drawStardust(partCtx);
      drawMouseParticles();

      // Realtime Audio level visualizer processing
      if (window.audioAnalyser && window.audioDataArray && document.getElementById('audioControl').classList.contains('playing')) {
        window.audioAnalyser.getByteFrequencyData(window.audioDataArray);
        const bars = document.querySelectorAll('.visualizer-bar');
        const buckets = [2, 4, 6, 8, 10]; 
        bars.forEach((bar, idx) => {
          const val = window.audioDataArray[buckets[idx]] || 0;
          const scale = 0.2 + (val / 255) * 0.8;
          bar.style.transform = `scaleY(${scale})`;
        });
      }

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
